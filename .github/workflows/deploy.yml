name: Deploy
on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
        with:
          node-version: 22
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Apply D1 Migrations
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          d1Token: ${{ secrets.CLOUDFLARE_D1_TOKEN }}
          workingDirectory: "apps/server"
          packageManager: npm
          command: d1 migrations apply acorp-invoice --remote --env=production

      - name: Build backend
        run: npx turbo run build --filter=server

      # Deploy Backend (Cloudflare Worker)
      - name: Deploy Backend
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: "apps/server"
          packageManager: npm
          command: deploy --env=production

      # Build and Deploy Frontends to Cloudflare Pages)
      - name: Build Invoice
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        run: npx turbo run build --filter=invoice

      - name: Deploy Frontend
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: "apps/invoice"
          packageManager: npm
          command: pages deploy dist --branch=main --project-name=invoice
