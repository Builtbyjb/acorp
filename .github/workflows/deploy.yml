name: Deploy
on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    strategy:
      matrix:
        app:
          - name: home
            filter: acorp
          - name: insights
            filter: insights
          - name: invoice
            filter: invoice
          - name: lumina
            filter: lumina
          - name: opencomms
            filter: opencomms
          - name: traqr
            filter: traqr
          - name: zendo
            filter: zendo
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build ${{ matrix.app.name }}
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        run: npx turbo run build --filter=${{ matrix.app.filter }}

      - name: Deploy ${{ matrix.app.name }}
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/${{ matrix.app.name }}
          packageManager: npm
          command: pages deploy dist --branch=main --project-name=${{ matrix.app.name }}
